name: yoltec_mobile
description: App movil Yoltec - Consultorio medico con IA de pre-evaluacion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.1.0

  # Estado
  provider: ^6.1.0

  # Almacenamiento local
  shared_preferences: ^2.2.2

  # Internacionalizacion (para DatePicker en espanol)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Material icons
  cupertino_icons: ^1.0.2

  # Firebase / FCM
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Selección de imágenes (foto de perfil)
  image_picker: ^1.0.7

  # Fuente Inter (Design System Yoltec)
  google_fonts: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


  # Eliminar referencias a assets que no existen para evitar errores de build
