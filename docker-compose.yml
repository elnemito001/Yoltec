version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yoltec-backend
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - DB_URL=
      - APP_KEY=base64:LhZf2UjVXJSmr5ea03bnNlyjTFyYuD+YTt/T9fHe4DA=
      - APP_DEBUG=true
      - APP_ENV=local
    env_file:
      - ./backend/.env.docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yoltec-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
