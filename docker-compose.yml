# Yoltec - Sistema de Consultorio Medico
# backend (Laravel) + frontend (Angular) + ia (FastAPI)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yoltec-backend
    restart: unless-stopped
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env.docker
    environment:
      - IA_SERVICE_URL=http://ia:5000
    volumes:
      - sqlite_data:/var/www/html/database
    networks:
      - yoltec-net
    depends_on:
      ia:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yoltec-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - yoltec-net

  ia:
    build:
      context: ./IA
      dockerfile: Dockerfile
    container_name: yoltec-ia
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./IA/.env
    networks:
      - yoltec-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  yoltec-net:
    driver: bridge

volumes:
  sqlite_data:
