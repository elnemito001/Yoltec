<div class="auth-container">
  <div class="auth-card">
    <h2>¿Olvidaste tu contraseña?</h2>

    <div *ngIf="!sent">
      <p class="subtitle">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
      <form (ngSubmit)="onSubmit()">
        <div *ngIf="message && isError" class="msg error">{{ message }}</div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="tu@correo.com" required>
        </div>
        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Enviando...' : 'Enviar enlace' }}
        </button>
      </form>
    </div>

    <div *ngIf="sent" class="sent-state">
      <div class="check-icon">✉️</div>
      <p>{{ message }}</p>
      <p class="hint">Revisa tu bandeja de entrada y sigue el enlace.</p>
    </div>

    <a routerLink="/login" class="back-link">← Volver al inicio de sesión</a>
  </div>
</div>
