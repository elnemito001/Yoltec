<div class="login-bg">
  <div class="login-card">
    <div class="login-head">
      <img src="./logo.jpeg" alt="Yoltec" class="login-logo">
      <h1>Yoltec</h1>
      <p>Sistema clínico académico</p>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs">
      <button [class.active]="activeTab === 'student'" (click)="setActiveTab('student')">Estudiante</button>
      <button [class.active]="activeTab === 'doctor'" (click)="setActiveTab('doctor')">Doctor</button>
    </div>

    <!-- Estudiante -->
    <form *ngIf="activeTab === 'student'" (ngSubmit)="onStudentLogin()" #studentForm="ngForm">
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <div class="field">
        <label>Número de control</label>
        <input type="text" [(ngModel)]="studentData.identificador" name="identificador"
          placeholder="Ej: 22690495" required>
      </div>
      <div class="field">
        <label>NIP</label>
        <div class="pass-wrap">
          <input [type]="showPasswordStudent ? 'text' : 'password'"
            [(ngModel)]="studentData.password" name="password" placeholder="Tu NIP de 6 dígitos" required>
          <button type="button" class="eye" (click)="togglePassword('student')">{{ showPasswordStudent ? '⚿' : '⚿' }}</button>
        </div>
      </div>
      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? 'Cargando...' : 'Iniciar sesión' }}
      </button>
      <div class="login-foot">
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </form>

    <!-- Doctor -->
    <form *ngIf="activeTab === 'doctor'" (ngSubmit)="onDoctorLogin()" #doctorForm="ngForm">
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <div class="field">
        <label>Usuario</label>
        <input type="text" [(ngModel)]="doctorData.identificador" name="identificador"
          placeholder="Tu nombre de usuario" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <div class="pass-wrap">
          <input [type]="showPasswordDoctor ? 'text' : 'password'"
            [(ngModel)]="doctorData.password" name="password" placeholder="Tu contraseña" required>
          <button type="button" class="eye" (click)="togglePassword('doctor')">{{ showPasswordDoctor ? '⚿' : '⚿' }}</button>
        </div>
      </div>
      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? 'Cargando...' : 'Iniciar sesión' }}
      </button>
      <div class="login-foot">
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>
</div>
