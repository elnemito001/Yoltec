<div class="auth-container">
  <div class="auth-card">
    <h2>Nueva contraseña</h2>

    <div *ngIf="done" class="sent-state">
      <div class="check-icon">✅</div>
      <p>{{ message }}</p>
      <p class="hint">Redirigiendo al inicio de sesión...</p>
    </div>

    <form *ngIf="!done && !(!token)" (ngSubmit)="onSubmit()">
      <p class="subtitle">Elige una nueva contraseña para tu cuenta.</p>
      <div *ngIf="message" class="msg" [class.error]="isError" [class.success]="!isError">{{ message }}</div>

      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" [(ngModel)]="passwordConfirmation" name="passwordConfirmation" placeholder="Repite la contraseña" required>
      </div>
      <button type="submit" class="btn-primary" [disabled]="isLoading || !token">
        {{ isLoading ? 'Guardando...' : 'Guardar contraseña' }}
      </button>
    </form>

    <div *ngIf="!token && !done" class="msg error">{{ message }}</div>

    <a routerLink="/login" class="back-link">← Volver al inicio de sesión</a>
  </div>
</div>
