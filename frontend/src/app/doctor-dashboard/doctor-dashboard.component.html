<div class="doctor-dashboard">
  <app-doctor-header
    [doctorName]="doctorName"
    [activeSection]="activeSection"
    [totalPendientes]="totalPendientes"
    (sectionChange)="setActiveSection($event)"
    (logoutEvent)="logout()">
  </app-doctor-header>

  <main class="dashboard-content">
    <section *ngIf="activeSection === 'inicio'" class="content-section">
      <app-doctor-inicio [doctorName]="doctorName"></app-doctor-inicio>
    </section>

    <section *ngIf="activeSection === 'citas'" class="content-section">
      <app-doctor-citas></app-doctor-citas>
    </section>

    <section *ngIf="activeSection === 'bitacoras'" class="content-section">
      <app-doctor-bitacoras></app-doctor-bitacoras>
    </section>

    <section *ngIf="activeSection === 'recetas'" class="content-section">
      <app-doctor-recetas></app-doctor-recetas>
    </section>

    <section *ngIf="activeSection === 'pre-evaluaciones'" class="content-section">
      <app-doctor-pre-evaluaciones
        (pendientesChange)="totalPendientes = $event">
      </app-doctor-pre-evaluaciones>
    </section>

    <section *ngIf="activeSection === 'ia-prioridad'" class="content-section">
      <app-doctor-ia-prioridad></app-doctor-ia-prioridad>
    </section>

    <section *ngIf="activeSection === 'estadisticas'" class="content-section">
      <app-doctor-estadisticas></app-doctor-estadisticas>
    </section>
  </main>
</div>
